name: Build MaliOpt

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      # Desativar o cache para esta execução (para eliminar interferência)
      # - name: Cache do Gradle (DESATIVADO TEMPORARIAMENTE)
      #   uses: actions/cache@v4
      #   ...

      - name: Diagnosticar ficheiros access widener
        run: |
          echo "=== Ficheiros .accesswidener encontrados ==="
          find . -name "*.accesswidener" -type f -print
          echo "=== Outros ficheiros access widener ==="
          find . -name "*accesswidener*" -type f -print
          echo "=== Referências no build.gradle ==="
          grep -r "accessWidener" build.gradle || echo "Nenhuma"
          echo "=== Referências em gradle.properties ==="
          grep -r "accessWidener" gradle.properties || echo "Nenhuma"

      - name: Remover todos os access wideners e criar um válido
        run: |
          find . -name "*.accesswidener" -type f -delete
          find . -name "*accesswidener*" -type f -delete
          mkdir -p src/main/resources
          echo "accessWidener v2 named" > src/main/resources/maliopt.accesswidener
          echo "✅ Access widener válido criado."

      - name: Limpar cache do Loom
        run: rm -rf .gradle/loom-cache || true

      - name: Gerar Gradle Wrapper
        run: |
          if [ ! -f "./gradlew" ]; then
            gradle wrapper --gradle-version 8.8
          fi
          chmod +x ./gradlew

      - name: Compilar com Gradle
        run: ./gradlew clean build --refresh-dependencies --no-daemon

      # ... restantes passos (upload, release) ...

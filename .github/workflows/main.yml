name: Build MaliOpt

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Cache do Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 🧹 Limpeza definitiva: remove QUALQUER access widener e cache do Loom
      - name: Eliminar access wideners e cache do Loom
        run: |
          echo "🔍 Procurando ficheiros .accesswidener..."
          find . -name "*.accesswidener" -type f -print -delete || true
          echo "🗑️  Removendo cache do Loom..."
          rm -rf .gradle/loom-cache || true
          echo "✅ Limpeza concluída."

      # 🔧 Gerar Wrapper (se necessário) — AGORA DEPOIS DA LIMPEZA TOTAL
      - name: Gerar Gradle Wrapper
        run: |
          if [ ! -f "./gradlew" ]; then
            gradle wrapper --gradle-version 8.8
          fi
          chmod +x ./gradlew

      - name: Compilar com Gradle
        run: ./gradlew clean build --refresh-dependencies --no-daemon

      - name: Upload do artefacto
        uses: actions/upload-artifact@v4
        with:
          name: maliopt-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Criar Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
